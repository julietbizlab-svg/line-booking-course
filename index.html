<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f7a5a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="課程預約系統">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>課程預約系統</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2e8;
      --card: #ffffff;
      --text: #18221f;
      --muted: #66706c;
      --accent: #1f7a5a;
      --line: #dfe5df;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(145deg, rgba(31, 122, 90, 0.12), transparent 42%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 420px);
      padding: 36px 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 18px 44px rgba(24, 34, 31, 0.12);
      text-align: center;
    }

    .mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 9vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">約</div>
    <h1>課程預約系統</h1>
    <p>手機開啟後可加入主畫面，之後會在這裡預約與管理課程。</p>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js");
      });
    }
  </script>
</body>
</html>
