<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f7a5a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="課程預約系統">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>課程預約系統</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2e8;
      --card: #ffffff;
      --text: #18221f;
      --muted: #66706c;
      --accent: #1f7a5a;
      --line: #dfe5df;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(145deg, rgba(31, 122, 90, 0.12), transparent 42%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 720px);
      padding: 36px 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 18px 44px rgba(24, 34, 31, 0.12);
      text-align: center;
    }

    .mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 9vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 26px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .schedule {
      margin-top: 32px;
      text-align: left;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .course-list {
      display: grid;
      gap: 10px;
    }

    .course {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px 16px;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }

    .course-title {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      font-weight: 800;
      line-height: 1.4;
    }

    .course-meta,
    .course-seats {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .course-seats {
      color: var(--accent);
      font-weight: 800;
      white-space: nowrap;
    }

    @media (max-width: 560px) {
      .course {
        grid-template-columns: 1fr;
      }

      .course-seats {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">約</div>
    <h1>課程預約系統</h1>
    <p>手機開啟後可加入主畫面，之後會在這裡預約與管理課程。</p>
    <button id="cloud-test" type="button">雲端連線測試</button>
    <div id="cloud-status" class="status" role="status" aria-live="polite"></div>

    <section class="schedule" aria-labelledby="schedule-title">
      <h2 id="schedule-title">本月課表</h2>
      <div id="schedule-list" class="course-list">
        <div class="status">讀取中...</div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script>
    const cloudTestButton = document.querySelector("#cloud-test");
    const cloudStatus = document.querySelector("#cloud-status");
    const scheduleList = document.querySelector("#schedule-list");

    function toDateText(dateText, timeText) {
      const date = new Date(`${dateText}T${timeText || "00:00"}:00`);
      return date.toLocaleDateString("zh-TW", {
        month: "numeric",
        day: "numeric",
        weekday: "short"
      });
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function getMonthRange() {
      const today = new Date();
      const start = new Date(today.getFullYear(), today.getMonth(), 1);
      start.setHours(0, 0, 0, 0);

      const end = new Date(today.getFullYear(), today.getMonth() + 1, 0);

      return {
        start: start.toISOString().slice(0, 10),
        end: end.toISOString().slice(0, 10)
      };
    }

    function renderCourses(snapshot) {
      if (snapshot.empty) {
        scheduleList.innerHTML = '<div class="status">本月尚無課程</div>';
        return;
      }

      const courses = [];
      snapshot.forEach((doc) => courses.push(doc.data()));
      const openCourses = courses.filter((course) => course.status === "open");

      if (openCourses.length === 0) {
        scheduleList.innerHTML = '<div class="status">本月尚無課程</div>';
        return;
      }

      openCourses.sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

      scheduleList.innerHTML = openCourses.map((course) => {
        const remaining = Number(course.capacity || 0) - Number(course.enrolled || 0);

        return `
          <article class="course">
            <div>
              <h3 class="course-title">${escapeHtml(course.title)}</h3>
              <div class="course-meta">${escapeHtml(toDateText(course.date, course.time))} ${escapeHtml(course.time)}｜${escapeHtml(course.instructor)}</div>
            </div>
            <div class="course-seats">剩 ${remaining} 名</div>
          </article>
        `;
      }).join("");
    }

    async function loadMonthlyCourses() {
      try {
        await window.authReady;
        const { start, end } = getMonthRange();
        const snapshot = await db.collection("courses")
          .where("date", ">=", start)
          .where("date", "<=", end)
          .get();

        renderCourses(snapshot);
      } catch (error) {
        console.error(error);
        scheduleList.innerHTML = `<div class="status">課表讀取失敗：${error.message}</div>`;
      }
    }

    cloudTestButton.addEventListener("click", async () => {
      cloudTestButton.disabled = true;
      cloudStatus.textContent = "連線中...";

      try {
        await window.authReady;
        const pingRef = db.collection("config").doc("ping");

        await pingRef.set({
          at: firebase.firestore.FieldValue.serverTimestamp()
        });

        const snapshot = await pingRef.get();
        const at = snapshot.get("at");
        const timeText = at ? at.toDate().toLocaleString("zh-TW") : "剛剛";

        cloudStatus.textContent = `連線成功：${timeText}`;
      } catch (error) {
        console.error(error);
        cloudStatus.textContent = `連線失敗：${error.message}`;
      } finally {
        cloudTestButton.disabled = false;
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js");
      });
    }

    loadMonthlyCourses();
  </script>
</body>
</html>
